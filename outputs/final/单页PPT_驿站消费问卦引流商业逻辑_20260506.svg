<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="slideBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071522"/>
      <stop offset="0.48" stop-color="#123651"/>
      <stop offset="1" stop-color="#06111d"/>
    </linearGradient>
    <radialGradient id="waterGlow" cx="52%" cy="47%" r="45%">
      <stop offset="0" stop-color="#58dfff" stop-opacity="0.38"/>
      <stop offset="0.42" stop-color="#267ba7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#081420" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="whiteCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0f5ff"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d6d95"/>
      <stop offset="1" stop-color="#0f344e"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#66e7ff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#68dfff"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000b12" flood-opacity="0.45"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
      <path d="M 0 0 L 18 9 L 0 18 z" fill="#9ef0ff"/>
    </marker>
    <style>
      .title { font: 700 52px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .sub { font: 400 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #c9f4ff; }
      .eyebrow { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #7fe8ff; letter-spacing: 2px; }
      .cardTitle { font: 700 28px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #11324a; }
      .cardText { font: 400 20px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #355b70; }
      .darkTitle { font: 700 27px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .darkText { font: 400 20px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #d9f8ff; }
      .centerTitle { font: 700 34px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .centerText { font: 400 21px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #d9f8ff; }
      .pill { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #073044; }
      .small { font: 400 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #bdefff; }
      .valueTitle { font: 700 23px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .valueText { font: 400 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #d7f8ff; }
      .flowLine { fill: none; stroke: url(#cyanLine); stroke-width: 5; marker-end: url(#arrow); filter: url(#softGlow); }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#slideBg)"/>
  <rect width="1920" height="1080" fill="url(#waterGlow)"/>

  <path d="M-40 870 C270 730, 500 940, 775 780 S1260 660, 1980 785" fill="none" stroke="#ffffff" stroke-width="72" stroke-opacity="0.055"/>
  <path d="M-40 870 C270 730, 500 940, 775 780 S1260 660, 1980 785" fill="none" stroke="#7de8ff" stroke-width="5" stroke-opacity="0.72"/>
  <path d="M-30 238 C260 128, 500 280, 820 190 S1320 118, 1970 230" fill="none" stroke="#ffffff" stroke-width="58" stroke-opacity="0.045"/>
  <path d="M-30 238 C260 128, 500 280, 820 190 S1320 118, 1970 230" fill="none" stroke="#63dfff" stroke-width="4" stroke-opacity="0.44"/>

