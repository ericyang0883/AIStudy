  <rect x="122" y="276" width="72" height="72" rx="20" fill="#0f8fc1"/>
  <text x="147" y="325" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">1</text>
  <text x="215" y="300" class="cardTitle">入口种草</text>
