  <text x="215" y="366" class="cardText">建立主题期待</text>

  <rect x="590" y="246" width="350" height="160" rx="18" fill="url(#whiteCard)" stroke="#b7efff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="620" y="276" width="72" height="72" rx="20" fill="#0f8fc1"/>
  <text x="645" y="325" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">2</text>
  <text x="713" y="300" class="cardTitle">首站消费</text>
  <text x="713" y="336" class="cardText">咖啡 / 文创 / 限定券</text>
  <text x="713" y="366" class="cardText">消费后触发问卦</text>

  <rect x="1088" y="246" width="350" height="160" rx="18" fill="url(#whiteCard)" stroke="#b7efff" stroke-width="2" filter="url(#shadow)"/>
