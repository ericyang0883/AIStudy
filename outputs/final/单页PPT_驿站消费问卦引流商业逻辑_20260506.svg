  <text x="1143" y="325" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">3</text>
  <text x="1211" y="300" class="cardTitle">AI问卦</text>
  <text x="1211" y="336" class="cardText">输入人生问题</text>
  <text x="1211" y="366" class="cardText">生成智慧签和权益</text>

  <rect x="487" y="480" width="440" height="210" rx="26" fill="url(#blueCard)" stroke="#78e6ff" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="530" y="540" class="darkTitle">AI问卦咖啡店</text>
  <text x="530" y="584" class="darkText">小型咖啡吧 + 文创售卖 + 互动屏</text>
  <text x="530" y="618" class="darkText">游客在消费场景里完成问卦</text>
  <rect x="530" y="642" width="118" height="32" rx="16" fill="#bff6ff"/>
  <text x="558" y="665" class="pill">首站</text>
  <rect x="662" y="642" width="118" height="32" rx="16" fill="#bff6ff"/>
  <text x="690" y="665" class="pill">核销</text>
  <rect x="794" y="642" width="92" height="32" rx="16" fill="#bff6ff"/>
  <text x="822" y="665" class="pill">会员</text>

  <circle cx="1178" cy="585" r="128" fill="#103650" stroke="#8eeeff" stroke-width="4" filter="url(#shadow)"/>
  <circle cx="1178" cy="585" r="98" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.25"/>
  <text x="1110" y="562" class="centerTitle">智慧签</text>
  <text x="1083" y="604" class="centerText">卦象启发</text>
