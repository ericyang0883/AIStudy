  <rect x="1488" y="792" width="300" height="130" rx="18" fill="#12354e" stroke="#66ddff" stroke-width="2"/>
  <text x="1522" y="840" class="valueTitle">文创零售站</text>
  <text x="1522" y="878" class="valueText">收藏 / 伴手礼 / 集章</text>
