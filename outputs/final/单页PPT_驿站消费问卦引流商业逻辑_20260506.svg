  <rect x="90" y="972" width="1740" height="62" rx="31" fill="#0e2b40" stroke="#55dfff" stroke-opacity="0.65"/>
  <text x="130" y="1012" class="small">运营结果：消费核销数据、问题偏好标签、停留时长、会员积分、智慧签分享，持续推动二次到访和复购</text>
</svg>
