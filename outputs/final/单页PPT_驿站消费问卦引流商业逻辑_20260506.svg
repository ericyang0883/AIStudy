  <path d="M940 326 C998 326, 1028 326, 1078 326" class="flowLine"/>
  <path d="M1260 406 C1250 458, 1228 494, 1204 528" class="flowLine"/>
  <path d="M1070 585 C1005 585, 980 585, 934 585" class="flowLine"/>

  <rect x="1298" y="498" width="250" height="116" rx="18" fill="#f8fdff" stroke="#b7efff" stroke-width="2" filter="url(#shadow)"/>
  <text x="1330" y="545" class="cardTitle">分流推荐</text>
  <text x="1330" y="580" class="cardText">按问题类型给出理由</text>

  <path d="M1423 614 C1408 710, 1320 776, 1195 796" class="flowLine"/>
  <path d="M1423 614 C1510 690, 1535 760, 1510 840" class="flowLine"/>
  <path d="M1423 614 C1320 682, 1015 710, 890 790" class="flowLine"/>
  <path d="M1423 614 C1160 668, 595 704, 370 790" class="flowLine"/>

  <rect x="180" y="792" width="300" height="130" rx="18" fill="#12354e" stroke="#66ddff" stroke-width="2"/>
