  <text x="684" y="906" class="valueText">纪念照、徽章、周边</text>

  <rect x="1120" y="792" width="300" height="130" rx="18" fill="#12354e" stroke="#66ddff" stroke-width="2"/>
  <text x="1154" y="840" class="valueTitle">潮汐市集</text>
